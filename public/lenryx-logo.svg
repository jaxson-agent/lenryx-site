<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 320" width="520" height="320">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#35C9FF"/>
      <stop offset="100%" stop-color="#1B8EF8"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#1B8EF8" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1B8EF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="520" height="320" fill="#000000"/>

  <!-- ── ICON (left side, vertically centered) ── -->
  <!-- Equilateral triangle, apex up. Center at (105, 140) -->
  <!-- Top node: (105, 60) | Bottom-left: (55, 155) | Bottom-right: (155, 155) -->

  <!-- Triangle edges -->
  <line x1="105" y1="60" x2="55" y2="155" stroke="url(#blueGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="105" y1="60" x2="155" y2="155" stroke="url(#blueGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="55" y1="155" x2="155" y2="155" stroke="url(#blueGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Outer node circles -->
  <circle cx="105" cy="60" r="9" fill="url(#blueGrad)"/>
  <circle cx="55" cy="155" r="9" fill="url(#blueGrad)"/>
  <circle cx="155" cy="155" r="9" fill="url(#blueGrad)"/>

  <!-- Spokes from center to each node -->
  <!-- Center of triangle: (105, 113) -->
  <line x1="105" y1="113" x2="105" y2="60" stroke="#1B8EF8" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="105" y1="113" x2="55" y2="155" stroke="#1B8EF8" stroke-width="1" stroke-opacity="0.6"/>
  <line x1="105" y1="113" x2="155" y2="155" stroke="#1B8EF8" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Center glow halo -->
  <circle cx="105" cy="113" r="18" fill="url(#centerGlow)"/>

  <!-- Center node with pulse animation -->
  <!-- Pulse ring 1 -->
  <circle cx="105" cy="113" r="5" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0">
    <animate attributeName="r" values="5;20;5" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.8;0;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Pulse ring 2 (offset) -->
  <circle cx="105" cy="113" r="5" fill="none" stroke="#1B8EF8" stroke-width="1" stroke-opacity="0">
    <animate attributeName="r" values="5;20;5" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.6;0;0.6" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
  </circle>
  <!-- Center dot -->
  <circle cx="105" cy="113" r="4" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="r" values="4;5.5;4" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ── WORDMARK (right of icon) ── -->
  <text
    x="195" y="125"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="62"
    font-weight="800"
    letter-spacing="3"
    fill="#ffffff"
  >LENRYX<tspan fill="#1B8EF8" dx="2">.ai</tspan></text>

  <!-- Tagline -->
  <text
    x="195" y="158"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-weight="400"
    letter-spacing="1.5"
    fill="#6B7280"
  >Where Intelligence Becomes Execution</text>
</svg>
