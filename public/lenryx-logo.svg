<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#35C9FF"/>
      <stop offset="100%" stop-color="#1B8EF8"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#1B8EF8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1B8EF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="340" fill="#000000"/>

  <!-- ── ICON — centered at x=300, icon group y: 20–185 ── -->
  <!-- Equilateral triangle. Centroid at (300, 118) -->
  <!-- Top: (300, 28)  Bottom-left: (222, 178)  Bottom-right: (378, 178) -->

  <!-- All three triangle edges -->
  <line x1="300" y1="28"  x2="222" y2="178" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="28"  x2="378" y2="178" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="222" y1="178" x2="378" y2="178" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Vertex nodes -->
  <circle cx="300" cy="28"  r="8" fill="url(#blueGrad)"/>
  <circle cx="222" cy="178" r="8" fill="url(#blueGrad)"/>
  <circle cx="378" cy="178" r="8" fill="url(#blueGrad)"/>

  <!-- Spokes from centroid (300, 128) to each vertex -->
  <line x1="300" y1="128" x2="300" y2="28"  stroke="#1B8EF8" stroke-width="1" stroke-opacity="0.65"/>
  <line x1="300" y1="128" x2="222" y2="178" stroke="#1B8EF8" stroke-width="1" stroke-opacity="0.65"/>
  <line x1="300" y1="128" x2="378" y2="178" stroke="#1B8EF8" stroke-width="1" stroke-opacity="0.65"/>

  <!-- Center glow halo -->
  <circle cx="300" cy="128" r="20" fill="url(#centerGlow)"/>

  <!-- Pulse ring 1 -->
  <circle cx="300" cy="128" r="5" fill="none" stroke="#ffffff" stroke-width="1.5">
    <animate attributeName="r" values="5;22;5" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.8;0;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Pulse ring 2 — offset phase -->
  <circle cx="300" cy="128" r="5" fill="none" stroke="#1B8EF8" stroke-width="1">
    <animate attributeName="r" values="5;22;5" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.6;0;0.6" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
  </circle>
  <!-- Center dot -->
  <circle cx="300" cy="128" r="4.5" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="r" values="4.5;6;4.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ── WORDMARK — centered below icon, font-size reduced to fit ── -->
  <text
    x="300" y="248"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="52"
    font-weight="800"
    letter-spacing="6"
    fill="#ffffff"
  >LENRYX<tspan fill="#1B8EF8" dx="4" letter-spacing="0">.ai</tspan></text>

  <!-- ── TAGLINE ── -->
  <text
    x="300" y="285"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="12.5"
    font-weight="400"
    letter-spacing="2.5"
    fill="#6B7280"
  >Where Intelligence Becomes Execution</text>
</svg>
