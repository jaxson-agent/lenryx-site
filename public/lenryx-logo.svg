<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" width="460" height="340">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#35C9FF"/>
      <stop offset="100%" stop-color="#1B8EF8"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#1B8EF8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1B8EF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="460" height="340" fill="#000000"/>

  <!-- ── ICON — centered horizontally, stacked above wordmark ── -->
  <!-- Equilateral triangle. Center at (230, 105) -->
  <!-- Top node: (230, 30)  Bottom-left: (163, 178)  Bottom-right: (297, 178) -->

  <!-- Triangle edges — all three sides -->
  <line x1="230" y1="30"  x2="163" y2="178" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="230" y1="30"  x2="297" y2="178" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round"/>
  <line x1="163" y1="178" x2="297" y2="178" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round"/>

  <!-- Outer vertex nodes -->
  <circle cx="230" cy="30"  r="8" fill="url(#blueGrad)"/>
  <circle cx="163" cy="178" r="8" fill="url(#blueGrad)"/>
  <circle cx="297" cy="178" r="8" fill="url(#blueGrad)"/>

  <!-- Spokes from centroid to each vertex -->
  <!-- Centroid: ((230+163+297)/3, (30+178+178)/3) = (230, 129) -->
  <line x1="230" y1="129" x2="230" y2="30"  stroke="#1B8EF8" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="230" y1="129" x2="163" y2="178" stroke="#1B8EF8" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="230" y1="129" x2="297" y2="178" stroke="#1B8EF8" stroke-width="1" stroke-opacity="0.7"/>

  <!-- Center glow halo -->
  <circle cx="230" cy="129" r="20" fill="url(#centerGlow)"/>

  <!-- Pulse ring 1 -->
  <circle cx="230" cy="129" r="5" fill="none" stroke="#ffffff" stroke-width="1.5">
    <animate attributeName="r" values="5;22;5" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.8;0;0.8" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <!-- Pulse ring 2 (offset phase) -->
  <circle cx="230" cy="129" r="5" fill="none" stroke="#1B8EF8" stroke-width="1">
    <animate attributeName="r" values="5;22;5" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
    <animate attributeName="stroke-opacity" values="0.6;0;0.6" dur="2.5s" begin="1.25s" repeatCount="indefinite"/>
  </circle>
  <!-- Center dot -->
  <circle cx="230" cy="129" r="4.5" fill="#ffffff" filter="url(#glow)">
    <animate attributeName="r" values="4.5;6;4.5" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- ── WORDMARK — centered below icon ── -->
  <text
    x="230" y="238"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="68"
    font-weight="800"
    letter-spacing="4"
    fill="#ffffff"
  >LENRYX<tspan fill="#1B8EF8" dx="2">.ai</tspan></text>

  <!-- ── TAGLINE ── -->
  <text
    x="230" y="276"
    text-anchor="middle"
    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="400"
    letter-spacing="2"
    fill="#6B7280"
  >Where Intelligence Becomes Execution</text>
</svg>
